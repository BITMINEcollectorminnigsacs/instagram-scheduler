<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Scheduler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            color: #000;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .post-types {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .type-btn {
            padding: 14px 8px;
            border: 2px solid #333;
            border-radius: 12px;
            background: transparent;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .type-btn.active {
            border-color: #fff;
            color: #fff;
            background: #222;
        }

        .type-btn svg {
            width: 20px;
            height: 20px;
        }

        textarea, input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0a0a0a;
            color: #fff;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }

        textarea:focus, input:focus, select:focus {
            border-color: #fff;
        }

        textarea {
            min-height: 100px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-row > * {
            flex: 1;
        }

        .quick-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .quick-btn {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 10px;
            background: transparent;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .feature-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #fff;
            flex: none;
        }

        .feature-item span {
            font-size: 14px;
            color: #ccc;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #333;
            border-radius: 14px;
            background: transparent;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .post-item {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-type-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 8px;
            background: #333;
            color: #fff;
        }

        .post-time {
            font-size: 12px;
            color: #888;
        }

        .post-caption {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .post-target {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .post-features {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .feature-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(225, 48, 108, 0.2);
            color: #e1306c;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #ff4444;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        .empty-state svg {
            width: 50px;
            height: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .template-item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-item:hover {
            border-color: #fff;
        }

        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .template-name {
            font-size: 14px;
            font-weight: 600;
        }

        .template-type {
            font-size: 11px;
            color: #888;
            background: #0a0a0a;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .template-preview {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .char-count {
            font-size: 12px;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }

        .hashtag-btns {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .hashtag-btn {
            padding: 6px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: transparent;
            color: #888;
            font-size: 12px;
            cursor: pointer;
        }

        .hashtag-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d26a;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
        }

        .hidden {
            display: none !important;
        }

        .countdown {
            font-size: 12px;
            color: #e1306c;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .post-types {
                grid-template-columns: repeat(2, 1fr);
            }
            .input-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Instagram Scheduler</h1>
            <p>Plan, preview & auto-post</p>
        </div>

        <div class="status-bar">
            <span class="status-dot"></span>
            <span>Scheduler Active</span>
            <span id="nextPostCountdown"></span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('compose')">Compose</button>
            <button class="tab-btn" onclick="switchTab('scheduled')">
                Scheduled <span id="badgeCount" style="background:#e1306c;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px;">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('templates')">Templates</button>
        </div>

        <!-- COMPOSE PANEL -->
        <div class="panel active" id="panel-compose">
            <div class="card">
                <div class="card-title">Post Type</div>
                <div class="post-types">
                    <button class="type-btn active" onclick="setType('feed')" id="type-feed">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        Feed
                    </button>
                    <button class="type-btn" onclick="setType('story')" id="type-story">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a4 4 0 1 1 4-4 4 4 0 0 1-4 4z"/></svg>
                        Story
                    </button>
                    <button class="type-btn" onclick="setType('reel')" id="type-reel">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Reel
                    </button>
                    <button class="type-btn" onclick="setType('dm')" id="type-dm">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        DM
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-title" id="captionLabel">Caption</div>
                <textarea id="caption" placeholder="Write your caption or message..." oninput="updateCharCount()"></textarea>
                <div class="char-count" id="charCount">0 chars</div>
                <div class="hashtag-btns">
                    <button class="hashtag-btn" onclick="insertText('#')">#hashtag</button>
                    <button class="hashtag-btn" onclick="insertText('@')">@mention</button>
                    <button class="hashtag-btn" onclick="insertText('🔥')">Emoji</button>
                </div>
            </div>

            <div class="card hidden" id="dmTargetCard">
                <div class="card-title">Target User</div>
                <input type="text" id="dmTarget" placeholder="@username or comma-separated list">
            </div>

            <div class="card">
                <div class="card-title">Schedule</div>
                <div class="input-row">
                    <input type="date" id="schedDate">
                    <input type="time" id="schedTime">
                    <select id="timezone">
                        <option value="IST">IST (UTC+5:30)</option>
                        <option value="GMT">GMT (UTC+0)</option>
                        <option value="EST">EST (UTC-5)</option>
                        <option value="PST">PST (UTC-8)</option>
                        <option value="CET">CET (UTC+1)</option>
                    </select>
                </div>
                <div class="quick-btns">
                    <button class="quick-btn" onclick="setQuickTime('now')">Now</button>
                    <button class="quick-btn" onclick="setQuickTime('tomorrow9')">Tomorrow 9AM</button>
                    <button class="quick-btn" onclick="setQuickTime('tomorrow6')">Tomorrow 6PM</button>
                    <button class="quick-btn" onclick="setQuickTime('nextweek')">Next Week</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Extra Features</div>
                <div class="feature-list">
                    <label class="feature-item">
                        <input type="checkbox" id="firstComment">
                        <span>Auto-post first comment</span>
                    </label>
                    <label class="feature-item">
                        <input type="checkbox" id="crossPost">
                        <span>Cross-post to Facebook & Threads</span>
                    </label>
                    <label class="feature-item">
                        <input type="checkbox" id="autoReply">
                        <span>Auto-reply to comments (AI)</span>
                    </label>
                    <label class="feature-item" id="storyLinkWrap">
                        <input type="checkbox" id="storyLink">
                        <span>Add story link sticker</span>
                    </label>
                </div>
            </div>

            <button class="btn-primary" onclick="schedulePost()">
                Schedule Post
            </button>
            <button class="btn-secondary" onclick="previewPost()">
                Preview
            </button>
        </div>

        <!-- SCHEDULED PANEL -->
        <div class="panel" id="panel-scheduled">
            <div id="scheduledList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <p>No scheduled posts yet.</p>
                    <p style="font-size:13px;margin-top:5px;">Create one in the Compose tab.</p>
                </div>
            </div>
            <button class="btn-secondary" onclick="clearAll()" style="margin-top:15px;">Clear All</button>
        </div>

        <!-- TEMPLATES PANEL -->
        <div class="panel" id="panel-templates">
            <div id="templateList"></div>
            <button class="btn-secondary" onclick="saveCurrentAsTemplate()" style="margin-top:15px;">
                + Save Current as Template
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Data storage using localStorage
        let posts = JSON.parse(localStorage.getItem('ig_posts') || '[]');
        let currentType = 'feed';
        
        const templates = [
            { name: 'Morning Motivation', type: 'feed', caption: 'Rise and grind! Every morning is a new opportunity to chase your dreams and make things happen. What are you working on today?\n\n#motivation #morningvibes #hustle' },
            { name: 'Product Launch', type: 'reel', caption: 'Introducing our latest drop! Swipe up to shop now and be the first to grab yours. Limited stock available!\n\n#newarrival #shopnow #limitededition' },
            { name: 'Story Poll', type: 'story', caption: 'This or that? Vote below and let us know what you prefer!\n\nA) Option 1\nB) Option 2' },
            { name: 'DM Welcome', type: 'dm', caption: 'Hey! Thanks for reaching out. How can I help you today?' }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setQuickTime('tomorrow9');
            renderScheduled();
            renderTemplates();
            updateCharCount();
            startScheduler();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('type-' + type).classList.add('active');
            
            const dmCard = document.getElementById('dmTargetCard');
            const captionLabel = document.getElementById('captionLabel');
            const storyLinkWrap = document.getElementById('storyLinkWrap');
            
            if (type === 'dm') {
                dmCard.classList.remove('hidden');
                captionLabel.textContent = 'Message';
                storyLinkWrap.classList.add('hidden');
            } else {
                dmCard.classList.add('hidden');
                captionLabel.textContent = 'Caption';
                storyLinkWrap.classList.remove('hidden');
                if (type !== 'story') {
                    storyLinkWrap.classList.add('hidden');
                }
            }
        }

        function updateCharCount() {
            const len = document.getElementById('caption').value.length;
            document.getElementById('charCount').textContent = len + ' chars';
        }

        function insertText(text) {
            const ta = document.getElementById('caption');
            const start = ta.selectionStart;
            ta.value = ta.value.substring(0, start) + text + ta.value.substring(ta.selectionEnd);
            ta.selectionStart = ta.selectionEnd = start + text.length;
            ta.focus();
            updateCharCount();
        }

        function setQuickTime(option) {
            const now = new Date();
            let d = new Date();
            
            if (option === 'now') {
                d = now;
            } else if (option === 'tomorrow9') {
                d.setDate(d.getDate() + 1);
                d.setHours(9, 0, 0, 0);
            } else if (option === 'tomorrow6') {
                d.setDate(d.getDate() + 1);
                d.setHours(18, 0, 0, 0);
            } else if (option === 'nextweek') {
                d.setDate(d.getDate() + 7);
                d.setHours(9, 0, 0, 0);
            }
            
            document.getElementById('schedDate').value = d.toISOString().split('T')[0];
            document.getElementById('schedTime').value = 
                String(d.getHours()).padStart(2, '0') + ':' + 
                String(d.getMinutes()).padStart(2, '0');
        }

        function schedulePost() {
            const caption = document.getElementById('caption').value.trim();
            const date = document.getElementById('schedDate').value;
            const time = document.getElementById('schedTime').value;
            const dmTarget = document.getElementById('dmTarget').value.trim();
            
            if (!caption) { showToast('Please write a caption'); return; }
            if (!date || !time) { showToast('Please pick date and time'); return; }
            if (currentType === 'dm' && !dmTarget) { showToast('Please enter target username'); return; }
            
            const post = {
                id: Date.now(),
                type: currentType,
                caption: caption,
                date: date,
                time: time,
                target: dmTarget,
                features: {
                    firstComment: document.getElementById('firstComment').checked,
                    crossPost: document.getElementById('crossPost').checked,
                    autoReply: document.getElementById('autoReply').checked,
                    storyLink: document.getElementById('storyLink').checked
                },
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            posts.push(post);
            localStorage.setItem('ig_posts', JSON.stringify(posts));
            
            renderScheduled();
            showToast('Scheduled successfully!');
            
            // Reset form
            document.getElementById('caption').value = '';
            document.getElementById('dmTarget').value = '';
            document.getElementById('firstComment').checked = false;
            document.getElementById('crossPost').checked = false;
            document.getElementById('autoReply').checked = false;
            document.getElementById('storyLink').checked = false;
            updateCharCount();
            setQuickTime('tomorrow9');
        }

        function renderScheduled() {
            const list = document.getElementById('scheduledList');
            document.getElementById('badgeCount').textContent = posts.length;
            
            if (posts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <p>No scheduled posts yet.</p>
                        <p style="font-size:13px;margin-top:5px;">Create one in the Compose tab.</p>
                    </div>`;
                return;
            }
            
            // Sort by date/time
            posts.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            
            const typeLabels = { feed: 'Feed', story: 'Story', reel: 'Reel', dm: 'DM' };
            const typeColors = { feed: '#e1306c', story: '#833ab4', reel: '#f77737', dm: '#405de6' };
            
            list.innerHTML = posts.map(p => {
                const dt = new Date(p.date + 'T' + p.time);
                const now = new Date();
                const diff = dt - now;
                const isPast = diff < 0;
                const timeStr = dt.toLocaleString('en-US', { 
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                
                const extraBadges = [];
                if (p.features.firstComment) extraBadges.push('1st Comment');
                if (p.features.crossPost) extraBadges.push('Cross-post');
                if (p.features.autoReply) extraBadges.push('Auto-reply');
                if (p.features.storyLink) extraBadges.push('Link');
                
                return `
                    <div class="post-item" style="${isPast ? 'opacity:0.5;' : ''}">
                        <div class="post-header">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span class="post-type-badge" style="background:${typeColors[p.type]}20;color:${typeColors[p.type]};">
                                    ${typeLabels[p.type]}
                                </span>
                                <span class="post-time">${timeStr}</span>
                                ${isPast ? '<span style="color:#ff4444;font-size:11px;">OVERDUE</span>' : ''}
                            </div>
                            <button class="delete-btn" onclick="deletePost(${p.id})">×</button>
                        </div>
                        <div class="post-caption">${p.caption.substring(0, 120)}${p.caption.length > 120 ? '...' : ''}</div>
                        ${p.target ? `<div class="post-target">To: @${p.target}</div>` : ''}
                        ${extraBadges.length ? `<div class="post-features">${extraBadges.map(b => `<span class="feature-tag">${b}</span>`).join('')}</div>` : ''}
                    </div>`;
            }).join('');
        }

        function deletePost(id) {
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('ig_posts', JSON.stringify(posts));
            renderScheduled();
            showToast('Post deleted');
        }

        function clearAll() {
            if (!posts.length) return;
            if (!confirm('Delete all scheduled posts?')) return;
            posts = [];
            localStorage.setItem('ig_posts', JSON.stringify(posts));
            renderScheduled();
            showToast('All posts cleared');
        }

        function previewPost() {
            const caption = document.getElementById('caption').value.trim();
            if (!caption) { showToast('Nothing to preview'); return; }
            showToast('Preview: ' + caption.substring(0, 40) + (caption.length > 40 ? '...' : ''));
        }

        function renderTemplates() {
            const list = document.getElementById('templateList');
            const typeLabels = { feed: 'Feed', story: 'Story', reel: 'Reel', dm: 'DM' };
            
            list.innerHTML = templates.map((t, i) => `
                <div class="template-item" onclick="loadTemplate(${i})">
                    <div class="template-header">
                        <span class="template-name">${t.name}</span>
                        <span class="template-type">${typeLabels[t.type]}</span>
                    </div>
                    <div class="template-preview">${t.caption}</div>
                </div>
            `).join('');
        }

        function loadTemplate(idx) {
            const t = templates[idx];
            setType(t.type);
            document.getElementById('caption').value = t.caption;
            updateCharCount();
            switchTab('compose');
            showToast('Template loaded');
        }

        function saveCurrentAsTemplate() {
            const caption = document.getElementById('caption').value.trim();
            if (!caption) { showToast('Write something first'); return; }
            
            const name = prompt('Template name:');
            if (!name) return;
            
            templates.push({ name, type: currentType, caption });
            renderTemplates();
            showToast('Template saved');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Background scheduler - checks every minute
        function startScheduler() {
            setInterval(() => {
                const now = new Date();
                posts.forEach(p => {
                    if (p.status === 'pending') {
                        const dt = new Date(p.date + 'T' + p.time);
                        if (now >= dt) {
                            p.status = 'posted';
                            executePost(p);
                        }
                    }
                });
                localStorage.setItem('ig_posts', JSON.stringify(posts));
                renderScheduled();
                updateCountdown();
            }, 60000); // Check every minute
            
            updateCountdown();
        }

        function executePost(post) {
            console.log('EXECUTING POST:', post);
            // Here you would integrate with Instagram API
            // For now, it marks as posted and shows notification
            showToast(`Posted: ${post.type.toUpperCase()} #${post.id}`);
        }

        function updateCountdown() {
            const pending = posts.filter(p => p.status === 'pending');
            const el = document.getElementById('nextPostCountdown');
            
            if (pending.length === 0) {
                el.textContent = '';
                return;
            }
            
            const next = pending.sort((a, b) => 
                new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)
            )[0];
            
            const dt = new Date(next.date + 'T' + next.time);
            const now = new Date();
            const diff = dt - now;
            
            if (diff > 0) {
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                el.textContent = `| Next: ${hours}h ${mins}m`;
            } else {
                el.textContent = '| Posting now...';
            }
        }
    </script>
</body>
</html>
